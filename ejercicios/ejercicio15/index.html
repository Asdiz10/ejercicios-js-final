<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videojuegos</title>
    <style>
        .resaltado{
            background-color: rgb(230, 230, 59);
            padding: 10px;
        }

    .tarjetas {
        border: 2px solid #333;       /* El borde para separar cada producto */
        padding: 15px;                 /* Espacio dentro de la tarjeta para que el texto no toque el borde */
        margin: 5px;                  /* Espacio por fuera para que las tarjetas no se peguen entre sí */
        border-radius: 10px;           /* Bordes redondeados (queda más profesional) */
        width: 250px;                  /* Un ancho fijo para que todas las tarjetas midan lo mismo */
        background-color: #f9f9f9;     /* Un color de fondo suave */
        display: inline-block;         /* ¡IMPORTANTE! Para que se pongan una al lado de otra */
        vertical-align: top;           /* Para que si una es más alta que otra, se alineen por arriba */
        box-shadow: 2px 2px 5px grey;  /* Una pequeña sombra para dar profundidad */
}

    .tarjetas h3 {
    margin-top: 0;                 /* Quita el espacio extra arriba del título */
    color: #d35400;                /* Un color llamativo para el nombre (ej. naranja) */
}
    </style>
</head>
<body class="flex justify-center flex-col items-center">
    <h1 class="from-neutral-900 font-bold text-2xl font-['Helvetica']">Gestión de Videojuegos</h1>
    
    <div class="border w-15 h-15 flex justify-center p-20 flex-col items-center mt-25">
        <h2>Ej1</h2>
        <br>
        <button id="boton" class="border w-25 rounded p-2 text-sm text-white bg-slate-600">Lanzar Alerta</button>
    </div>
    

    <div class="border w-52 h-52 flex justify-center p-20 flex-col items-center mt-25">
        <h2 class="mb-10 flex w-25">Ej2 - Ej3</h2>
        <button class="border text-sm w-25 rounded bg-slate-600 text-white" id="boton2">Cargar Info</button>
        <div id="div1"></div>
        <button class="border text-sm w-25 rounded bg-slate-600 text-white" id="boton3">Resetear</button>
    </div>


    <div class="border w-52 h-52 flex justify-center p-20 flex-col items-center mt-25">
        <h2 class="mb-10 w-20">Ejercicio 4</h2>
        <input class="border rounded-sm w-35 text-center" id="input" type="text" placeholder="Nombre de Juego">
        <select class="border rounded-sm text-center" name="" id="sele">
            <option value="">Elige la plataforma</option>
            <option value="PS5">ps5</option>
            <option value="PC">pc</option>
        </select>
        <br>
        <button id="boton4" class="border rounded bg-slate-600 text-sm text-white w-25">Realizar pedido</button>
        <div id="div2" class="w-25 text-center"><p>sin pedidos</p></div>
    </div>


    <div class="border w-52 h-52 flex justify-center p-20 flex-col items-center mt-25">
        <h2 class="w-20 mb-15">Ejercicio 5</h2>
        <input id="input2" type="text" placeholder="URL" class="text-center border rounded">
        <div id="div3" class="w-100 h-100"></div>
    </div>

    <div class="border w-250 h-200 flex justify-center p-20 flex-col items-center mt-25">
        <button id="boton5">Mostrar Catálogo</button>
        <div class="flex flex-col" id="contenedor"></div>
    </div>
    
    
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="index.js"></script>
</body>
</html>
