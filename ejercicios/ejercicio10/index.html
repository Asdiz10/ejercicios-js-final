<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio10</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex justify-center flex-col items-center gap-5">
    
    <div class="bg-slate-500 flex justify-center flex-col items-center mt-50 border p-10 w-50">
        <div class="gap-5 flex flex-col">
            <input class="bg-white border w-20 rounded" id="i1" type="text">
        <input class="bg-white border w-20 rounded" id="i2" type="text">
        </div>
        <br>
    <select name="" id="sele">
        <option value="500">Tarjeta</option>
        <option value="450">Efectivo</option>
    </select>
    <br>
    <button class="border rounded text-yellow-100 bg-black" id="boton">Calcular Precio</button>

    </div>
    <h1 class="" id="h1"></h1>
    <script>
        let title = document.querySelector("#h1")
        let ipt1 = document.querySelector("#i1")
        let ipt2 = document.querySelector("#i2")
        const selec = document.querySelector("#sele")
        const btn = document.querySelector("#boton")

  



        function hola(){
            if(ipt1.value == "" || ipt2.value == ""){
                title.innerHTML = ` Faltan datos
                `
                document.body.style.backgroundColor = "yellow"
            } else if(ipt2.value >= 14){
                title.innerHTML = ` Felicidades ${ipt1.value} eres mayor de edad, este es el precio ${selec.value}
                `
                document.body.style.backgroundColor = "green"
            } else{
                title.innerHTML = ` Lo siento ${ipt1.value} no tienes la edad suficiente
                `
                document.body.style.backgroundColor = "red"
            }
            
        }
        btn.addEventListener("click", hola)
        
    </script>
</body>
</html>
