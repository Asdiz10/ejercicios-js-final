<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercici 3</title>
</head>
<body class="flex justify-center">
    <div>
        <input type="text" name="" id="input">
        <h1 id="h11"></h1>
    </div>
    


    <script>
        let ipt = document.querySelector("#input")
        let tittle = document.querySelector("#h11")

        function cambia(){
            tittle.innerHTML = ipt.value
        }
        ipt.addEventListener("input", cambia)
    </script>
</body>
</html>
